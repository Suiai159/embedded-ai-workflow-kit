schema: agent-assets-1.0
canonical:
  handoff: AGENTS.md
  rules: .agents/rules
  skills: .agents/skills
  context: .context
  workflow: .workflow/project.yaml
  tools: tools

rules:
  - Root Agent files are discovery shims; reusable policy lives under .agents/rules.
  - Edit canonical Skills under .agents/skills first.
  - Skills describe workflow; deterministic execution belongs in tools/.
  - Project facts belong in .context/, not in agent-specific prompts.
  - Agents must update PROJECT_LOG.md and/or EVOLUTION.md for meaningful changes.
  - Agents must stage coherent checkpoints, validate them, then commit when usable unless the user explicitly says not to.
