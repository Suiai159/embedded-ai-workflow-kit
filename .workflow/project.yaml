workflow:
  mode: workflow_kit
  description: Agent-neutral embedded workflow package. Configure this file after copying the workflow into a concrete project.

project:
  name: embedded-ai-workflow-kit
  kind: workflow_kit

board:
  name: unconfigured

mcu:
  family: unconfigured
  device: unconfigured

toolchain:
  type: none
  # Supported adapter values after project setup:
  # - gcc
  # - cmake
  # - keil

build:
  log_path: reports/build_log.txt
  # command: make
  # test_command: make test
  # elf_path: build/firmware.elf
  # hex_path: build/firmware.hex

flash:
  method: none
  log_path: reports/flash_log.txt
  # method: command
  # command: openocd -f interface/stlink.cfg -f target/<target>.cfg -c "program build/firmware.elf verify reset exit"

verify:
  report_path: reports/verify_report.md
  # command: python .agents/skills/verify/verify.py --single-run --max-retries 0 --req requirements.md

serial:
  port: unconfigured
  baudrate: 115200

layout:
  reports: reports
  architecture: []
  tests: []

