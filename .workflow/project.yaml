project:
  name: very_test

board:
  name: STM32F103 template board

mcu:
  family: STM32F1xx
  device: STM32F103C8

toolchain:
  type: keil
  project_file: MDK-ARM/very_test.uvprojx
  exe: D:/Keil5/UV4/UV4.exe
  groups:
    driver: Driver
    test: Test

build:
  hex_path: MDK-ARM/very_test/very_test.hex
  log_path: tools/build_log.txt

flash:
  method: keil
  log_path: tools/flash_log.txt

serial:
  port: auto
  baudrate: 115200

layout:
  app: App
  service: Service
  driver: Driver
  test: Test
  reports: reports

