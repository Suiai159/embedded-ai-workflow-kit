schema: context-engineering-1.0
context_kind: engineering
source_of_truth:
  workflow_config: .workflow/project.yaml
  project_structure: .project_structure
  agent_assets: .agents/manifest.yaml
  agent_rules: .agents/rules
  requirement_doc: 需求.md

layout:
  reports: reports
  architecture: []
  tests: []

directory_policy:
  workflow_invariant:
    - path: docs
      role: workflow documentation and handoff guides
      changes_when: workflow rules, test checklist, or usage docs change
    - path: .context
      role: AI handoff fact source
      changes_when: engineering, hardware, version, or runtime facts change
    - path: .workflow
      role: workflow/project configuration source
      changes_when: project, toolchain, layout, test, flash, or report configuration changes
    - path: .agents
      role: agent-neutral rules and canonical Skills
      changes_when: Agent rules, Skills, or compatibility metadata change
    - path: tools
      role: deterministic workflow commands and adapters
      changes_when: workflow actions or adapters change
    - path: reports
      role: current evidence snapshots for automation reports
      changes_when: build, flash, review, check, or verify evidence is refreshed
  project_architecture: []
  platform_or_tool_variable: []
  rules:
    - The workflow kit does not ship a default user architecture directory.
    - Concrete projects must declare architecture directories and dependency rules before code generation.
    - The workflow keeps a test interface, but it does not create a default Test directory.
    - Put host OS, IDE, compiler, debugger, flash tool, board, and MCU differences into .workflow/project.yaml, .context/*, tools, or project-owned adapter files.
    - Keep build, flash, review, check, and verify reports under reports with fixed overwrite paths.

architecture:
  profile: unconfigured
  portability_note: This repository is a workflow kit. Architecture layers are project facts supplied by the adopting project.
  invariants:
    - A concrete project must declare its own architecture layers, ownership rules, and dependency direction.
    - Workflow directories are not application architecture layers.
    - Toolchain or host-platform changes must not silently rewrite the adopting project's declared architecture.
  layers: []
  platform_variable_boundary:
    host_os: [.workflow/project.yaml, tools/workflow.py]
    build_toolchain: [.workflow/project.yaml, tools/workflow.py]
    board_or_mcu: [.context/hardware.yaml, .workflow/project.yaml]
  current_project_architecture_boundary: []

initialization:
  entrypoint: unconfigured
  function: unconfigured
  intended_order: []
  current_notes:
    - No firmware project is bundled with the workflow kit.
    - The adopting project should document initialization order here.

ai_rules:
  must_read_before_code_change:
    - AGENTS.md
    - .context/engineering.yaml
    - .context/hardware.yaml
    - .context/version.yaml
    - .context/runtime.yaml
    - .agents/rules/entrypoints.md
    - .agents/rules/git.md
    - .agents/rules/logging.md
    - .workflow/project.yaml
    - 需求.md
  git_required:
    - run git status before editing
    - stage only task-owned changes
    - commit after validation passes unless the user explicitly says not to commit
  logging_required:
    - update PROJECT_LOG.md for project work, verification, blockers, or next steps
    - update EVOLUTION.md for framework, rule, Skill, tool, layout, or architecture policy changes
    - stage log updates together with the changes they explain
  do_not_guess:
    - architecture directories
    - board pins and signal polarity
    - clock rates and timing math
    - toolchain paths and output artifacts
    - current runtime pass/fail state
  update_when_changed:
    - architecture and layout declarations
    - resource ownership
    - toolchain or generated-code boundary
    - verified runtime state
