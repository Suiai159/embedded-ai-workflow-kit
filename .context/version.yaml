schema: context-version-1.0
context_kind: version
project:
  name: embedded-ai-workflow-kit
  kind: workflow_kit
  workflow_config: .workflow/project.yaml

toolchain:
  active_adapter: none
  gcc:
    status: adapter_available_not_active
  cmake:
    status: adapter_available_not_active
  keil:
    status: adapter_available_not_active

generated_code_boundaries:
  generated_or_external: []
  human_maintained:
    - AGENTS.md
    - .agents/rules
    - .agents/skills
    - .context
    - .workflow
    - docs
    - reports/README.md
    - tools

critical_scripts:
  workflow_cli: tools/workflow.py
  context_cli: tools/context.py
  git_guard: tools/git_guard.py
  log_guard: tools/log_guard.py
  agent_assets: tools/agent_assets.py
  project_structure: tools/project_structure.py
  dev_orchestrator: tools/dev_orchestrator.py

compatibility_notes:
  - This repository is a workflow kit, not a configured firmware project.
  - GCC, CMake, and Keil adapters exist in tools/workflow.py but are not active until .workflow/project.yaml is configured.
  - AGENTS.md is the agent-neutral entry point.
  - .agents/skills is the canonical Skill source.
  - Tool-specific compatibility mirrors are optional and should not be committed as canonical workflow facts.
